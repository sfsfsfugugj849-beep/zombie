<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escape del Sótano - Multijugador</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
  body { background: #111; color: #eee; overflow: hidden; }
  #menu, #lobby, #game { position: absolute; top:0; left:0; width:100vw; height:100vh; }
  #menu, #lobby { display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; z-index:10; }
  #game { display:none; }
  h1 { color:#ffcc00; font-size:36px; margin-bottom:20px; text-shadow:2px 2px #000; }
  h2 { color:#ff6666; margin-bottom:10px; }
  input, button { padding:10px 20px; margin:5px; font-size:16px; border:2px solid #ffcc00; background:#222; color:#fff; cursor:pointer; }
  input:focus { outline:none; background:#333; }
  button:hover { background:#ffcc00; color:#000; }
  #roomId { font-size:24px; color:#00ff00; background:#000; padding:10px; border:2px dashed #00ff00; margin:10px; }
  #playersList { margin:15px; padding:10px; background:#222; border:1px solid #555; min-width:300px; }
  .playerItem { padding:5px; color:#ffcc00; }
  canvas { background:#000; display:block; cursor:crosshair; image-rendering: pixelated; }
  #hud { position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.8); padding:10px; border:2px solid #ffcc00; z-index:5; }
  .lifeRow { margin:3px 0; color:#fff; font-size:14px; }
  .heart { color:#ff3333; }
  #dialog { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#000; border:4px solid #ffcc00; padding:20px; z-index:20; display:none; min-width:400px; text-align:center; }
  #dialog h3 { color:#ff6666; margin-bottom:15px; }
  #dialog input { width:100%; }
  #votePanel { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#000; border:4px solid #00ff00; padding:20px; z-index:20; display:none; text-align:center; }
  #msgBox { position:absolute; top:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.9); color:#ffcc00; padding:10px 20px; border:2px solid #ffcc00; z-index:15; display:none; }
  #timer { position:absolute; top:10px; left:10px; color:#ff3333; font-size:20px; background:rgba(0,0,0,0.8); padding:8px; border:2px solid #ff3333; z-index:5; }
  #weaponInfo { position:absolute; top:10px; right:10px; color:#00ff00; font-size:16px; background:rgba(0,0,0,0.8); padding:8px; border:2px solid #00ff00; z-index:5; display:none; }
</style>
</head>
<body>

<div id="menu">
  <h1>🦉 ESCAPE DEL SÓTANO 🦉</h1>
  <h2>Elige tu nombre:</h2>
  <input type="text" id="playerName" maxlength="12" placeholder="Tu nombre...">
  <button onclick="createRoom()">🏠 Crear Sala (Host)</button>
  <button onclick="showJoin()">🔗 Unirse a Sala</button>
  <div id="joinBox" style="display:none; margin-top:10px;">
    <input type="text" id="joinId" placeholder="ID de la sala...">
    <button onclick="joinRoom()">Entrar</button>
  </div>
</div>

<div id="lobby" style="display:none;">
  <h1>SALA DE ESPERA</h1>
  <div id="roomId"></div>
  <div id="playersList"></div>
  <div id="hostControls" style="display:none;">
    <button onclick="startGame()" style="background:#00ff00; color:#000; font-size:20px;">▶ INICIAR PARTIDA</button>
  </div>
  <p style="color:#888; margin-top:20px;">Esperando jugadores... (máx. 4)</p>
</div>

<div id="game">
  <canvas id="canvas"></canvas>
  <div id="timer">Duolingo llega en: <span id="timeLeft">5:00</span></div>
  <div id="weaponInfo">🔫 Arma: <span id="weaponName">Ninguna</span></div>
  <div id="hud"></div>
  <div id="msgBox"></div>
  <div id="dialog">
    <h3>🦉 DUOLINGO TE PREGUNTA:</h3>
    <p id="question" style="font-size:20px; color:#fff; margin:15px 0;"></p>
    <input type="text" id="answer" placeholder="Tu respuesta...">
    <button onclick="submitAnswer()">Responder</button>
  </div>
  <div id="votePanel">
    <h2 style="color:#00ff00;">🦉 DUOLINGO SE ACERCA...</h2>
    <p style="margin:15px 0;">¿Enfrentarlo con armas?</p>
    <p id="voteCount" style="font-size:18px; color:#ffcc00;">Votos: 0/0</p>
    <button onclick="castVote(true)" style="background:#00ff00; color:#000;">✅ SÍ</button>
    <button onclick="castVote(false)" style="background:#ff3333; color:#000;">❌ NO</button>
  </div>
</div>

<script>
// ============ VARIABLES GLOBALES ============
let peer = null;
let conn = null; // conexión al host (si soy cliente)
let connections = []; // conexiones a clientes (si soy host)
let isHost = false;
let myName = '';
let myId = '';
let roomId = '';
let gameStarted = false;

// Estado del juego
let players = {}; // {id: {name, x, y, targetX, targetY, lives, weapon, alive, color}}
let boxes = [];
let duolingo = null;
let duolingoTimer = 300; // 5 minutos en segundos
let currentQuestion = null;
let voting = false;
let votes = {};
let fightMode = false;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const WORLD_W = 1200;
const WORLD_H = 700;

const QUESTIONS = [
  {q: "¿Cómo se dice 'perro' en inglés?", a: "dog"},
  {q: "¿Cómo se dice 'gato' en inglés?", a: "cat"},
  {q: "¿Cómo se dice 'casa' en inglés?", a: "house"},
  {q: "Traduce: 'I am happy'", a: "yo estoy feliz"},
  {q: "¿Cómo se dice 'rojo' en inglés?", a: "red"},
  {q: "¿Cómo se dice 'agua' en inglés?", a: "water"},
  {q: "Traduce: 'Good morning'", a: "buenos dias"},
  {q: "¿Cómo se dice 'libro' en inglés?", a: "book"},
  {q: "¿Cómo se dice 'comer' en inglés?", a: "eat"},
  {q: "Traduce: 'Thank you'", a: "gracias"}
];

const WEAPONS = ['Pistola', 'Rifle', 'Bate', 'Cuchillo', 'Escopeta'];
const PLAYER_COLORS = ['#ff6666', '#66ff66', '#6666ff', '#ffff66'];

// ============ MENÚ ============
function showJoin() {
  document.getElementById('joinBox').style.display = 'block';
}

function createRoom() {
  myName = document.getElementById('playerName').value.trim();
  if (!myName) { alert('Escribe tu nombre'); return; }
  isHost = true;
  roomId = 'sala-' + Math.random().toString(36).substr(2, 6);
  peer = new Peer(roomId);
  peer.on('open', id => {
    myId = id;
    document.getElementById('menu').style.display = 'none';
    document.getElementById('lobby').style.display = 'flex';
    document.getElementById('roomId').textContent = 'ID: ' + roomId;
    document.getElementById('hostControls').style.display = 'block';
    players[id] = {name: myName, x: 200, y: 400, targetX: 200, targetY: 400, lives: 2, weapon: null, alive: true, color: PLAYER_COLORS[0]};
    updatePlayersList();
  });
  peer.on('connection', c => {
    if (Object.keys(players).length >= 4) { c.send({type:'full'}); c.close(); return; }
    connections.push(c);
    c.on('open', () => {
      c.on('message', handleMsg);
    });
  });
}

function joinRoom() {
  myName = document.getElementById('playerName').value.trim();
  roomId = document.getElementById('joinId').value.trim();
  if (!myName || !roomId) { alert('Completa los campos'); return; }
  peer = new Peer();
  peer.on('open', id => {
    myId = id;
    conn = peer.connect(roomId);
    conn.on('open', () => {
      conn.send({type:'join', name: myName, id: myId});
      conn.on('message', handleMsg);
      document.getElementById('menu').style.display = 'none';
      document.getElementById('lobby').style.display = 'flex';
      document.getElementById('roomId').textContent = 'Conectado a: ' + roomId;
    });
    conn.on('error', e => alert('Error: ' + e));
  });
}

// ============ MENSAJERÍA ============
function handleMsg(data) {
  if (data.type === 'full') { alert('Sala llena'); location.reload(); return; }
  if (data.type === 'join') {
    if (Object.keys(players).length >= 4) return;
    const colorIdx = Object.keys(players).length;
    players[data.id] = {name: data.name, x: 200 + colorIdx*50, y: 400, targetX: 200+colorIdx*50, targetY: 400, lives: 2, weapon: null, alive: true, color: PLAYER_COLORS[colorIdx]};
    updatePlayersList();
    broadcast({type:'sync', players: players});
  }
  if (data.type === 'sync') {
    players = data.players;
    updatePlayersList();
  }
  if (data.type === 'move') {
    if (players[data.id]) {
      players[data.id].targetX = data.x;
      players[data.id].targetY = data.y;
    }
  }
  if (data.type === 'start') {
    gameStarted = true;
    players = data.players;
    boxes = data.boxes;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    resizeCanvas();
    gameLoop();
    startTimer();
  }
  if (data.type === 'duolingo_spawn') {
    duolingo = data.duolingo;
    showMsg('🦉 ¡DUOLINGO HA LLEGADO!');
  }
  if (data.type === 'duolingo_move') {
    duolingo = data.duolingo;
  }
  if (data.type === 'question') {
    currentQuestion = data.question;
    document.getElementById('question').textContent = currentQuestion.q;
    document.getElementById('dialog').style.display = 'block';
    document.getElementById('answer').value = '';
    document.getElementById('answer').focus();
  }
  if (data.type === 'answer_result') {
    document.getElementById('dialog').style.display = 'none';
    if (data.correct) showMsg('✅ ¡Correcto! Duolingo se retira...');
    else {
      showMsg('❌ ¡Incorrecto! Has perdido una vida');
      players[myId].lives--;
      if (players[myId].lives <= 0) players[myId].alive = false;
    }
    currentQuestion = null;
  }
  if (data.type === 'open_box') {
    const box = boxes.find(b => b.id === data.boxId);
    if (box && !box.opened) {
      box.opened = true;
      if (data.weapon) {
        players[data.playerId].weapon = data.weapon;
        showMsg('🎁 ¡Encontraste un ' + data.weapon + '!');
      } else {
        showMsg('📦 La caja estaba vacía...');
      }
    }
  }
  if (data.type === 'vote_start') {
    voting = true;
    votes = {};
    document.getElementById('votePanel').style.display = 'block';
    updateVoteCount();
  }
  if (data.type === 'vote') {
    votes[data.id] = data.vote;
    updateVoteCount();
    if (isHost && Object.keys(votes).length === Object.keys(players).length) {
      resolveVote();
    }
  }
  if (data.type === 'vote_result') {
    document.getElementById('votePanel').style.display = 'none';
    voting = false;
    if (data.fight) {
      fightMode = true;
      showMsg('⚔️ ¡MODO COMBATE ACTIVADO!');
    } else {
      showMsg('🏃 Duolingo hace su pregunta...');
    }
  }
  if (data.type === 'fight_attack') {
    if (duolingo) {
      duolingo.hp -= data.damage;
      if (duolingo.hp <= 0) {
        showMsg('🎉 ¡DERROTASTE A DUOLINGO!');
        duolingo = null;
        fightMode = false;
        resetTimer();
      }
    }
  }
  if (data.type === 'player_died') {
    players[data.id].lives = 0;
    players[data.id].alive = false;
    showMsg('💀 ' + data.name + ' ha muerto');
  }
  if (data.type === 'game_over') {
    showMsg(data.msg);
  }
}

function broadcast(data) {
  connections.forEach(c => { if (c.open) c.send(data); });
}

function updatePlayersList() {
  const list = document.getElementById('playersList');
  list.innerHTML = '<h3>Jugadores (' + Object.keys(players).length + '/4):</h3>';
  Object.values(players).forEach(p => {
    list.innerHTML += '<div class="playerItem">● ' + p.name + '</div>';
  });
}

function updateVoteCount() {
  const total = Object.keys(players).length;
  const counted = Object.keys(votes).length;
  document.getElementById('voteCount').textContent = 'Votos: ' + counted + '/' + total;
}

// ============ INICIO DEL JUEGO ============
function startGame() {
  // Generar cajas
  boxes = [];
  for (let i = 0; i < 8; i++) {
    boxes.push({
      id: i,
      x: 100 + Math.random() * (WORLD_W - 200),
      y: 100 + Math.random() * (WORLD_H - 200),
      w: 50, h: 50,
      opened: false
    });
  }
  const startData = {type:'start', players: players, boxes: boxes};
  broadcast(startData);
  handleMsg(startData);
}

// ============ CANVAS Y RENDER ============
function resizeCanvas() {
  const scale = Math.min(window.innerWidth / WORLD_W, window.innerHeight / WORLD_H);
  canvas.width = WORLD_W * scale;
  canvas.height = WORLD_H * scale;
  canvas.style.margin = 'auto';
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', () => { if (gameStarted) resizeCanvas(); });

canvas.addEventListener('click', e => {
  if (!gameStarted || !players[myId] || !players[myId].alive) return;
  const rect = canvas.getBoundingClientRect();
  const scale = canvas.width / WORLD_W;
  const x = (e.clientX - rect.left) / scale;
  const y = (e.clientY - rect.top) / scale;
  players[myId].targetX = x;
  players[myId].targetY = y;
  conn ? conn.send({type:'move', id: myId, x: x, y: y}) : broadcast({type:'move', id: myId, x: x, y: y});
  
  // Verificar si hizo click en una caja
  boxes.forEach(box => {
    if (!box.opened && x > box.x && x < box.x + box.w && y > box.y && y < box.y + box.h) {
      const dist = Math.hypot(players[myId].x - (box.x+25), players[myId].y - (box.y+25));
      if (dist < 80) {
        if (isHost) openBox(box, myId);
        else conn.send({type:'open_box_req', boxId: box.id, playerId: myId});
      }
    }
  });
  
  // Atacar a Duolingo si está cerca y tenemos arma
  if (fightMode && duolingo && players[myId].weapon) {
    const dist = Math.hypot(players[myId].x - duolingo.x, players[myId].y - duolingo.y);
    if (dist < 100) {
      const dmg = getWeaponDamage(players[myId].weapon);
      const data = {type:'fight_attack', damage: dmg};
      conn ? conn.send(data) : broadcast(data);
      handleMsg({type:'fight_attack', damage: dmg});
    }
  }
});

function getWeaponDamage(w) {
  const damages = {'Pistola': 20, 'Rifle': 40, 'Bate': 15, 'Cuchillo': 10, 'Escopeta': 50};
  return damages[w] || 10;
}

function openBox(box, playerId) {
  const weapon = Math.random() < 0.6 ? WEAPONS[Math.floor(Math.random()*WEAPONS.length)] : null;
  const data = {type:'open_box', boxId: box.id, playerId: playerId, weapon: weapon};
  broadcast(data);
  handleMsg(data);
}

// Host maneja peticiones de abrir caja
peer && peer.on('connection', c => {
  c.on('message', data => {
    if (data.type === 'open_box_req' && isHost) {
      const box = boxes.find(b => b.id === data.boxId);
      if (box && !box.opened) openBox(box, data.playerId);
    }
  });
});

// ============ DIBUJO ============
function drawBackground() {
  // Suelo de sótano
  ctx.fillStyle = '#3a2818';
  ctx.fillRect(0, 0, WORLD_W, WORLD_H);
  
  // Patrón de ladrillos
  ctx.fillStyle = '#2a1808';
  for (let y = 0; y < WORLD_H; y += 40) {
    for (let x = 0; x < WORLD_W; x += 80) {
      const offset = (y / 40) % 2 === 0 ? 0 : 40;
      ctx.fillRect(x + offset, y, 78, 38);
    }
  }
  
  // Manchas oscuras
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  for (let i = 0; i < 15; i++) {
    ctx.beginPath();
    ctx.arc((i*137)%WORLD_W, (i*89)%WORLD_H, 20 + (i%3)*10, 0, Math.PI*2);
    ctx.fill();
  }
  
  // Paredes
  ctx.fillStyle = '#1a0808';
  ctx.fillRect(0, 0, WORLD_W, 30);
  ctx.fillRect(0, WORLD_H-30, WORLD_W, 30);
  ctx.fillRect(0, 0, 30, WORLD_H);
  ctx.fillRect(WORLD_W-30, 0, 30, WORLD_H);
  
  // Cadenas colgando
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 2;
  for (let i = 0; i < 5; i++) {
    const x = 100 + i * 250;
    ctx.beginPath();
    ctx.moveTo(x, 30);
    ctx.lineTo(x, 80);
    ctx.stroke();
  }
}

function drawBox(box) {
  if (box.opened) {
    ctx.fillStyle = '#4a2a08';
    ctx.fillRect(box.x, box.y+20, box.w, box.h-20);
    ctx.fillStyle = '#6a3a18';
    ctx.fillRect(box.x, box.y, box.w, 20);
  } else {
    ctx.fillStyle = '#8b5a2b';
    ctx.fillRect(box.x, box.y, box.w, box.h);
    ctx.fillStyle = '#5a3a1b';
    ctx.fillRect(box.x, box.y+box.h/2-2, box.w, 4);
    ctx.fillRect(box.x+box.w/2-2, box.y, 4, box.h);
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(box.x+box.w/2-3, box.y+box.h/2-3, 6, 6);
  }
}

function drawPlayer(p) {
  if (!p.alive) return;
  const x = p.x, y = p.y;
  // Cuerpo pixel art
  ctx.fillStyle = p.color;
  // Cabeza
  ctx.fillRect(x-8, y-24, 16, 16);
  // Ojos
  ctx.fillStyle = '#000';
  ctx.fillRect(x-5, y-20, 3, 3);
  ctx.fillRect(x+2, y-20, 3, 3);
  // Cuerpo
  ctx.fillStyle = p.color;
  ctx.fillRect(x-10, y-8, 20, 20);
  // Piernas
  ctx.fillStyle = '#222';
  ctx.fillRect(x-8, y+12, 6, 10);
  ctx.fillRect(x+2, y+12, 6, 10);
  // Arma
  if (p.weapon) {
    ctx.fillStyle = '#888';
    ctx.fillRect(x+10, y-5, 15, 4);
  }
  // Nombre
  ctx.fillStyle = '#fff';
  ctx.font = '12px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(p.name, x, y-30);
}

function drawDuolingo() {
  if (!duolingo) return;
  const x = duolingo.x, y = duolingo.y;
  // Cuerpo verde (búho Duolingo)
  ctx.fillStyle = '#58cc02';
  ctx.fillRect(x-20, y-30, 40, 50);
  // Ojos grandes
  ctx.fillStyle = '#fff';
  ctx.fillRect(x-15, y-25, 12, 12);
  ctx.fillRect(x+3, y-25, 12, 12);
  ctx.fillStyle = '#000';
  ctx.fillRect(x-12, y-22, 6, 6);
  ctx.fillRect(x+6, y-22, 6, 6);
  // Pico
  ctx.fillStyle = '#ff9600';
  ctx.fillRect(x-5, y-10, 10, 8);
  // Patas
  ctx.fillStyle = '#ff9600';
  ctx.fillRect(x-15, y+20, 8, 8);
  ctx.fillRect(x+7, y+20, 8, 8);
  // Barra de vida
  if (duolingo.hp < duolingo.maxHp) {
    ctx.fillStyle = '#000';
    ctx.fillRect(x-25, y-45, 50, 6);
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(x-24, y-44, 48 * (duolingo.hp/duolingo.maxHp), 4);
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const scale = canvas.width / WORLD_W;
  ctx.save();
  ctx.scale(scale, scale);
  
  drawBackground();
  boxes.forEach(drawBox);
  Object.values(players).forEach(drawPlayer);
  drawDuolingo();
  
  ctx.restore();
}

// ============ LÓGICA ============
function updatePlayers() {
  Object.values(players).forEach(p => {
    if (!p.alive) return;
    const dx = p.targetX - p.x;
    const dy = p.targetY - p.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 2) {
      p.x += (dx/dist) * 2;
      p.y += (dy/dist) * 2;
    }
    // Limitar al mundo
    p.x = Math.max(40, Math.min(WORLD_W-40, p.x));
    p.y = Math.max(40, Math.min(WORLD_H-40, p.y));
  });
}

function updateDuolingo() {
  if (!duolingo) return;
  // Buscar jugador más cercano
  let target = null;
  let minDist = Infinity;
  Object.values(players).forEach(p => {
    if (!p.alive) return;
    const d = Math.hypot(p.x - duolingo.x, p.y - duolingo.y);
    if (d < minDist) { minDist = d; target = p; }
  });
  if (target) {
    const dx = target.x - duolingo.x;
    const dy = target.y - duolingo.y;
    const d = Math.hypot(dx, dy);
    if (d > 5) {
      duolingo.x += (dx/d) * 1.5;
      duolingo.y += (dy/d) * 1.5;
    }
    if (isHost) broadcast({type:'duolingo_move', duolingo: duolingo});
    
    // Si está muy cerca y no estamos en combate
    if (d < 60 && !fightMode && !currentQuestion && !voting) {
      if (isHost) {
        // Preguntar en inglés
        const q = QUESTIONS[Math.floor(Math.random()*QUESTIONS.length)];
        currentQuestion = q;
        broadcast({type:'question', question: q});
        handleMsg({type:'question', question: q});
      }
    }
  }
}

function gameLoop() {
  if (!gameStarted) return;
  updatePlayers();
  if (isHost) updateDuolingo();
  draw();
  updateHUD();
  requestAnimationFrame(gameLoop);
}

// ============ TIMER ============
function startTimer() {
  setInterval(() => {
    if (!gameStarted) return;
    if (duolingo || voting || fightMode) return;
    duolingoTimer--;
    const m = Math.floor(duolingoTimer/60);
    const s = duolingoTimer%60;
    document.getElementById('timeLeft').textContent = m + ':' + (s<10?'0':'') + s;
    if (duolingoTimer <= 0) {
      spawnDuolingo();
    }
  }, 1000);
}

function resetTimer() {
  duolingoTimer = 300;
}

function spawnDuolingo() {
  duolingo = {x: WORLD_W/2, y: 50, hp: 100, maxHp: 100};
  if (isHost) {
    broadcast({type:'duolingo_spawn', duolingo: duolingo});
    // Iniciar votación si alguien tiene arma
    const hasWeapon = Object.values(players).some(p => p.alive && p.weapon);
    if (hasWeapon) {
      setTimeout(() => {
        voting = true;
        votes = {};
        broadcast({type:'vote_start'});
        handleMsg({type:'vote_start'});
      }, 2000);
    }
  }
}

function castVote(vote) {
  const data = {type:'vote', id: myId, vote: vote};
  conn ? conn.send(data) : broadcast(data);
  handleMsg(data);
  document.getElementById('votePanel').style.display = 'none';
}

function resolveVote() {
  const yes = Object.values(votes).filter(v => v).length;
  const no = Object.values(votes).filter(v => !v).length;
  const fight = yes > no;
  const data = {type:'vote_result', fight: fight};
  broadcast(data);
  handleMsg(data);
  if (!fight) {
    // Modo pregunta
    setTimeout(() => {
      const q = QUESTIONS[Math.floor(Math.random()*QUESTIONS.length)];
      currentQuestion = q;
      broadcast({type:'question', question: q});
      handleMsg({type:'question', question: q});
    }, 1500);
  }
}

function submitAnswer() {
  const ans = document.getElementById('answer').value.trim().toLowerCase();
  const correct = ans === currentQuestion.a.toLowerCase();
  document.getElementById('dialog').style.display = 'none';
  if (isHost) {
    broadcast({type:'answer_result', correct: correct});
    handleMsg({type:'answer_result', correct: correct});
    if (correct) {
      duolingo = null;
      fightMode = false;
      resetTimer();
    }
  }
}

// ============ HUD ============
function updateHUD() {
  const hud = document.getElementById('hud');
  let html = '<h3 style="color:#ffcc00;">VIDAS</h3>';
  Object.values(players).forEach(p => {
    const hearts = '❤'.repeat(Math.max(0,p.lives)) + '🖤'.repeat(Math.max(0,2-p.lives));
    const status = p.alive ? '' : ' 💀';
    html += '<div class="lifeRow">' + p.name + status + ': <span class="heart">' + hearts + '</span></div>';
  });
  hud.innerHTML = html;
  
  // Arma
  const wi = document.getElementById('weaponInfo');
  if (players[myId] && players[myId].weapon) {
    wi.style.display = 'block';
    document.getElementById('weaponName').textContent = players[myId].weapon;
  } else {
    wi.style.display = 'none';
  }
}

function showMsg(text) {
  const box = document.getElementById('msgBox');
  box.textContent = text;
  box.style.display = 'block';
  setTimeout(() => box.style.display = 'none', 3000);
}

// Enter para responder
document.getElementById('answer').addEventListener('keypress', e => {
  if (e.key === 'Enter') submitAnswer();
});
</script>
