<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duelo Matemático 2 Jugadores</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh}
    .card{background:#111827;padding:24px;border-radius:16px;max-width:720px;width:92%;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    h1{text-align:center;margin-top:0}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .player{flex:1;min-width:260px;background:#1f2937;padding:16px;border-radius:12px}
    button,input{font-size:16px;border:none;border-radius:10px;padding:12px}
    input{width:calc(100% - 24px);margin:10px 0;background:#0b1220;color:#fff}
    button{background:#38bdf8;color:#00111a;font-weight:bold;cursor:pointer}
    button:hover{opacity:.92}
    .q{font-size:20px;font-weight:bold;margin:12px 0}
    .score{margin-top:10px}
    .center{text-align:center;margin:16px 0}
    .hidden{display:none}
  </style>
</head>
<body>
  <div class="card">
    <h1>Duelo Matemático</h1>
    <p class="center">Responde una pregunta por turno. El primer jugador en llegar a 5 puntos gana.</p>
    <div class="center">
      <button onclick="startGame()">Empezar</button>
      <button onclick="resetGame()">Reiniciar</button>
    </div>

    <div id="game" class="hidden">
      <div class="row">
        <div class="player">
          <h2>Jugador 1</h2>
          <div id="q1" class="q"></div>
          <input id="a1" type="number" placeholder="Tu respuesta" />
          <button onclick="checkAnswer(1)">Responder</button>
          <div class="score">Puntos: <span id="s1">0</span></div>
        </div>

        <div class="player">
          <h2>Jugador 2</h2>
          <div id="q2" class="q"></div>
          <input id="a2" type="number" placeholder="Tu respuesta" />
          <button onclick="checkAnswer(2)">Responder</button>
          <div class="score">Puntos: <span id="s2">0</span></div>
        </div>
      </div>

      <div class="center"><div id="msg"></div></div>
    </div>
  </div>

  <script>
    let score1 = 0, score2 = 0;
    let current1 = 0, current2 = 0;
    const ops = ['+', '-', '*'];

    function randInt(min, max){
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function makeQuestion(){
      const op = ops[randInt(0, ops.length - 1)];
      let a = randInt(1, 12), b = randInt(1, 12), answer = 0;

      if(op === '+') answer = a + b;
      if(op === '-') {
        if(b > a) [a, b] = [b, a];
        answer = a - b;
      }
      if(op === '*') answer = a * b;

      return { text: `${a} ${op} ${b} = ?`, answer };
    }

    function updateUI(){
      document.getElementById('s1').textContent = score1;
      document.getElementById('s2').textContent = score2;
      document.getElementById('q1').textContent = current1.text;
      document.getElementById('q2').textContent = current2.text;
    }

    function startGame(){
      document.getElementById('game').classList.remove('hidden');
      resetGame();
    }

    function resetGame(){
      score1 = 0;
      score2 = 0;
      current1 = makeQuestion();
      current2 = makeQuestion();
      document.getElementById('a1').value = '';
      document.getElementById('a2').value = '';
      document.getElementById('msg').textContent = '¡Listo!';
      updateUI();
    }

    function checkAnswer(player){
      const input = document.getElementById(player === 1 ? 'a1' : 'a2');
      const val = Number(input.value);
      const current = player === 1 ? current1 : current2;

      if(val === current.answer){
        if(player === 1) score1++;
        else score2++;
        document.getElementById('msg').textContent = `Jugador ${player} acertó.`;
      } else {
        document.getElementById('msg').textContent = `Jugador ${player} falló. La respuesta era ${current.answer}.`;
      }

      if(player === 1) current1 = makeQuestion();
      else current2 = makeQuestion();

      input.value = '';
      updateUI();

      if(score1 >= 5) document.getElementById('msg').textContent = 'Jugador 1 ganó la competencia.';
      if(score2 >= 5) document.getElementById('msg').textContent = 'Jugador 2 ganó la competencia.';
    }
  </script>
</body>
</html>
