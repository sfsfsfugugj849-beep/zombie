función hexToRgba(hex,a){if(!hex||! hex.startsWith("#"))return 'rgba(200,200,200,${a})'; Sea h=hex.slice(1); si(h.longitud===3)h=h.split("").mapa(x=>x+x).join(""); return 'rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})';}
función easeOutQuad(t){return t*(2-t);}
función easeOutCubic(t){return 1-Math.pow(1-t,3);}
función easeOutBack(t){const c=1.70158; return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2);}
función lerp(a,b,t){devolver a+(b-a)*t;}

función makeEffect(delay,dur,draw,onDone){

 pushEffect({hasCallback:!! onDone,t:0,done:false,update(){const n=performance.now(); if(n<start){this.t=0; regresar;}this.t=Math.min(1,(n-start)/dur); if(this.t>=1){if(!fired&&onDone){fired=true; onDone();}this.done=true;}},draw(c){if(performance.now()>=start)draw(c,this.t);}});
}
función vfxLoop(){
 si(!vfxCanvas||! vfxCtx)ensureCanvas();

 const f=battleState.enemyTeam[idx];
 if(!f||f.currentHP>0||f.arisen)regreso;

 const success=Math.random()<0.15;
 if(battleState.isPvP)netSend({type:"arise",enemyIdx:idx,éxito});

}

 const enemigoArr=esPropietario?batallaEstado.enemigomiEquipo:batallaEstado.jugadorEquipo;
 const f=enemyArr[idx];
 if(!f)return;

 if(el){

 (isOwner?batallaEstaEstaJugadorEquipo:batallaEstaEnemigoEquipo).empuja(sombra);

}

función useAbility(fi,ai){
 si(!estadobatalla||! battleState.isPlayerTurn)return;
 const f=battleState.playerTeam[fi];
 if(!f||f.currentHP<=0||f.trapped>0||f.dustTurns>0)return;
 const ab=f.habilidades[ai];
 if(f.cds&&f.cds[ai]>0)return;

if(ab.special==="sysmenu"){
 battleState.isPlayerTurn=false;
 if(f.cds)f.cds[ai]=ab.cooldown||0;
 vfxSysCast(getFP("left").x,getFP("left").y,null);
 addLog(' 🖥️ ${f.name} abre el [SISTEMA]...',"sistema");
 refreshBS();
 openSystemMenu(fi);
 regresar;
 }
 battleState.isPlayerTurn=false;
 if(f.cds)f.cds[ai]=ab.cooldown||0;

if(ab.special==="dodge_counter"||ab.special==="esquivar"){

 });

 send(d){this._pub({t:"data",d});}

 batallaEstado={jugadorEquipo:equipoP,enemigoEquipo:eEquipo,esJugadorTurno:esAnfitrión,terminado:falso,isPvP:verdadero,ariseCharges:3};
 pendingEnemyTeam=null;
 document.getElementById("battleModal").classList.add("active");
 document.getElementById("leaveBattleBtn").style.display="none";
 document.getElementById("battleLog").innerHTML="";
 addLog("===== PVP 1v1 de COMBATE 1v1 =====","sistema");
 addLog('Rival: ${eTeam.map(e=>e.name).join(" & ")}',"system");
 addLog(isHost?" Empiezas primero (Host).":"El Host empieza primero.","system");
 delayed(300,()=>{renderArena(pTeam,eTeam,battleState.isPlayerTurn); if(battleState.isPlayerTurn)startPTurn(); else setTI("TURNO DEL RIVAL","var(--danger)");});
}
function execPvPEnemy(msg){
 if(!battleState)return;
 const fi=msg.fighterIdx,ai=msg.abilityIdx;
 const f=battleState.enemyTeam[fi];
 if(!f){battleState.isPlayerTurn=true; startPTurn(); regresar;}
 const ab=f.habilidades[ai];
 if(f.cds)f.cds[ai]=ab.cooldown||0;

if(msg.buff||(ab&&(ab.special==="dodge_counter"||ab.special==="esquivar"))){
 if(f.currentHP>0){
 f.dodgeActive=true; f.dodgeTurns=(ab&&ab.specialDuration)||2; f.dodgeType=ab&&ab.special;
 if(msg.sys){
 if(msg.sys.d>0)f.sysDmg=(f.sysDmg||1) +0,5*msg.sys,d;
 if(msg.sys.h>0){const add=Math.floor(f.maxHP*0.5*msg.sys.h); f.maxHP+=add; f.currentHP+=add;}
 addLog(' 🖥️ [SISTEMA] ${f.name} se mejora: ${msg.sys.d>0?'Daño x${(1+0.5*msg.sys.d).toFixed(1)} ':""}${msg.sys.h>0?'Vida x${(1+0.5*msg.sys.h).toFixed(1)}':""}',"enemy");
 }else{
 addLog('${f.name} activa ${ab?ab.name:"una mejora"}!',"enemy");
 }
 }
 refreshBS();
 delayed(800,()=>{battleState.isPlayerTurn=true; startPTurn();});
 regresar;
 }
 if(msg.outcome==="confused"){
 const ally=battleState.enemyTeam[msg.allyIdx];
 if(ally&&ally.currentHP>0){
 addLog(' 😵 ¡${f.name} está confundido y ataca a ${ally.name}!',"system");
 const aEl=document.getElementById('eF${msg.allyIdx}'),atkEl=document.getElementById('eF${fi}');
 vfxConfusedHit(atkEl,aEl,()=>{
 if(!battleState)return;
 ally.currentHP-=msg.dmg;
 addLog(' ${ally.name} recibe -${msg.dmg.toLocaleString()}!',"enemy");
 showDmg(aEl,msg.dmg,"#8a2be2","morado-daño"); updateHP(aEl,ally.currentHP,ally.maxHP); markDeadIf(aEl,aliado); refreshBS();
 finishPvPET();
 });
 }else terminaPvPET();
 regresar;
 }
 if(!ab||f.currentHP<=0){battleState.isPlayerTurn=true; startPTurn(); regresar;}
 const ti=msg.targetIdx;
 const tgt=battleState.playerTeam[ti];
 if(!tgt||tgt.currentHP<=0){battleState.isPlayerTurn=true; startPTurn(); regresar;}
 const dmg=msg.dmg,resultado=msg.resultado||" golpear";
 addLog('${f.name} usa ${ab.name}!',"enemy");

const applyFinish=()=>{
 if(!battleState)return;
 si(resultado==="golpe"){
 const finalDmg=ab.vfx==="goku_kaioken_beam"? Math.floor(dmg*1,5):d mg;
 tgt.currentHP-=finalDmg;
 if(msg.ns)Object.assign(tgt,msg.ns);
 const tEl=document.getElementById('pF${ti}');
 addLog(' ${tgt.name} recibe -${finalDmg.toLocaleString()}!',"enemy");
 mostrarDmg (tEl, daño final); updateHP(tEl,tgt.currentHP,tgt.maxHP); markDeadIf(tEl,tgt);
 if(msg.ns&&(msg.ns.trapped>0||msg.ns.burnTurns>0||msg.ns.confusedTurns>0||msg.ns.weakenedTurns>0||msg.ns.dustTurns>0||msg.ns.kwamiTurns>0))refreshBS();
 }si no(resultado==="rayo de muerte"){
 if(msg.ns)Object.assign(tgt,msg.ns);
 refreshBS();
 }si no(resultado==="kwami_hit"){
 tgt.currentHP-=dmg;
 if(msg.ns)Object.assign(tgt,msg.ns);
 f.currentHP-=msg.recoil||0;
 const tEl=document.getElementById('pF${ti}'),eEl=document.getElementById('eF${fi}'),ePos=getFP("right");
 addLog(' 🐈 ⬛ Kwami: recibes -${dmg.toLocaleString()} y ${f.name} -${(msg.recoil||0).aLocalString()}!',"sistema");
 mostrarDmg(tEl,dmg); updateHP(tEl,tgt.currentHP,tgt.maxHP); markDeadIf(tEl,tgt);
 mostrarDmg(eEl,msg.recoil||0, "#b060ff", "daño morado"); updateHP(eEl,f.currentHP,f.maxHP); markDeadIf(eEl,f);
 addImpactBurst(ePos.x,ePos.y,"#6a0dad",14,1.5);
 refreshBS();
 }si no(resultado==="esquivado"){
 addLog('¡${tgt.name} esquiva con Ultra Instinct!',"system");
 }si no(resultado==="bone_block"){
 addLog(' 🦴 ¡DETECCIÓN DEL PELIGRO! Una mano de huesos te protégé.',"system");
 }si no(resultado==="perfect_dodge"){
 addLog(' ⚡ ¡ESQUIVE PERFECTO! ${tgt.name} esquiva sin esfuerzo.',"system");
 }si no(resultado==="letal"){
 tgt.currentHP=0;
 const tEl=document.getElementById('pF${ti}');
 addLog(' 💀 ¡GOLPE LETAL! ${tgt.name} MUERE.',"system");
 showDmg (tEl, daño, "#fff", "letal-daño"); updateHP(tEl,0,tgt.maxHP); markDeadIf(tEl,tgt);
 shakeArena (600,25); addImpactBurst(getFP("left").x,getFP("left").y,"#ff0000",26,2.4);
 refreshBS();
 }si no(resultado==="reflejado"){
 const kd=msg.karmaDmg||0;
 f.currentHP-=kd;
 const eEl=document.getElementById('eF${fi}');
 addLog('¡${tgt.name} REFLEJA con Karma! ${f.name} -${kd.toLocaleString()}',"system");
 showDmg (eEl,kd,"#ff0000","karma-dmg"); updateHP(eEl,f.currentHP,f.maxHP); markDeadIf(eEl,f);
 }si no(resultado==="door_reflect"){
 const kd=msg.karmaDmg||0;
 f.currentHP-=kd;
 const eEl=document.getElementById('eF${fi}');
 addLog(' 🚪 ¡${tgt.name} devuelve el golpe con una puerta! ${f.name} -${kd.toLocaleString()}',"system");
 showDmg (anguila, kd, "#ffd700", "karma-dmg"); updateHP(eEl,f.currentHP,f.maxHP); markDeadIf(eEl,f);
 }
 finishPvPET();
 };

const dPos=getFP("left"),aPos=getFP("right");
 if(resultado==="reflejado"){vfxKarmaCounter(aPos.x,aPos.y,applyFinish); regresar;}
 if(outcome==="door_reflect"){vfxDoorReflect(dPos.x,dPos.y,aPos.x,aPos.y,applyFinish); regresar;}
 si(resultado==="bone_block"){vfxBoneBlock(dPos.x,dPos.y,applyFinish); regresar;}
 si(resultado==="esquivado"||resultado==="perfect_dodge"){
 makeEffect(0,400,(c,t)=>{c.save(); c.globalAlpha=(1-t)*0.5; drawOrb(c,dPos.x,dPos.y,40*(1-t),"#ffffff",0,4); c.restore();});
 retrasado (450, aplicarTerminar); regresar;
 }
 si(resultado==="letal"){
 const tEl=document.getElementById('pF${ti}');
 makeEffect(0,500,(c,t)=>{vfxExplosion(c,dPos.x,dPos.y,"#ff0000",t,140);});
 retrasado (500, aplicarTerminar); regresar;
 }
 const tEl=document.getElementById('pF${ti}'),atkEl=document.getElementById('eF${fi}');
 si(resultado==="rayo de muerte"){
 const tickFn=(n)=>{
 if(!battleState)return;
 const tick=Math.max(1,Math.floor(tgt.maxHP*0.05));
 tgt.currentHP-=tick;
 mostrarDmg (tEl, marca), "#ff0000", "karma-dmg"); updateHP(tEl,tgt.currentHP,tgt.maxHP); markDeadIf(tEl,tgt);
 addLog(' ☠️ Rayo de la Muerte: -${tick.toLocaleString()} (${n}/7)',"enemy");
 };
 playAttackVfx(ab,"right",atkEl,tEl,applyFinish,tickFn);
 regresar;
 }
 playAttackVfx(ab,"right",atkEl,tEl,applyFinish);
}
function finishPvPET(){
 if(!battleState)return;
 procesBurns();
 if(battleState.playerTeam.every(p=>p.currentHP<=0)){delayed(500,()=>finBatalla(false)); regresar;}
 if(battleState.enemyTeam.every(e=>e.currentHP<=0)){delayed(500,()=>finBatalla(true)); regresar;}
 delayed(800,()=>{battleState.isPlayerTurn=true; startPTurn();});
}
