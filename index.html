];

let history = [];
let pressCount = 0;
const $ = (id) => document.getElementById(id);
const factEl = $('fact');
const boxEl = $('factBox');
const btnEl = $('btnFact');
const counterEl = $('counter');
const statsEl = $('stats');

function pickRandomFact() {
  let available = FACTS.filter((_, i) => i !== history[history.length - 1]);
  if (available.length === 0) available = FACTS;
  const idx = FACTS.indexOf(available[Math.floor(Math.random() * available.length)]);
  history.push(idx);
  if (history.length > FACTS.length) history = history.slice(-Math.floor(FACTS.length / 2));
  return FACTS[idx];
}

function spawnFloatingNum() {
  const nums = ['0', '1', 'π', '∞', 'e', 'φ', '√2', '∑', 'i', 'Δ'];
  const num = nums[Math.floor(Math.random() * nums.length)];
  const el = document.createElement('div');
  el.className = 'floating-num';
  el.textContent = num;
  el.style.left = (Math.random() * 80 + 10) + '%';
  el.style.top = (Math.random() * 60 + 20) + '%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function showNewFact() {
  pressCount++;
  const fact = pickRandomFact();
  factEl.innerHTML = fact;
  boxEl.classList.remove('entering');
  void boxEl.offsetWidth;
  boxEl.classList.add('entering');
  counterEl.textContent = 'Dato #' + pressCount;
  statsEl.textContent = '📚 ' + FACTS.length + ' datos en total · Has visto ' + Math.min(pressCount, FACTS.length);
  spawnFloatingNum();
  if (pressCount % 5 === 0) spawnFloatingNum();
}

btnEl.addEventListener('click', showNewFact);
window.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); showNewFact(); }
});
</script>
